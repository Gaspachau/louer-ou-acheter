<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a35"/>
      <stop offset="100%" style="stop-color:#1a3a6b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a56db"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="200" fill="#1a56db" opacity="0.08"/>
  <circle cx="1050" cy="500" r="150" fill="#3b82f6" opacity="0.06"/>
  <circle cx="100" cy="550" r="120" fill="#1a56db" opacity="0.06"/>
  <!-- Top accent bar -->
  <rect x="80" y="80" width="160" height="6" rx="3" fill="url(#accent)"/>
  <!-- House icon -->
  <g transform="translate(80, 120)">
    <polygon points="60,0 0,55 15,55 15,110 45,110 45,75 75,75 75,110 105,110 105,55 120,55" fill="#1a56db" opacity="0.9"/>
    <polygon points="60,0 0,55 120,55" fill="#3b82f6" opacity="0.7"/>
  </g>
  <!-- Main title -->
  <text x="240" y="175" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-1">Louer ou Acheter</text>
  <!-- Subtitle -->
  <text x="240" y="230" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="400" fill="#93c5fd">Simulateur immobilier gratuit 2026</text>
  <!-- Divider -->
  <rect x="80" y="265" width="1040" height="1" fill="#1a56db" opacity="0.4"/>
  <!-- Value props -->
  <g transform="translate(80, 300)">
    <!-- Point 1 -->
    <circle cx="16" cy="16" r="16" fill="#1a56db" opacity="0.3"/>
    <text x="16" y="21" font-family="Arial" font-size="14" fill="#60a5fa" text-anchor="middle">✓</text>
    <text x="44" y="21" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">Résultat en 2 minutes</text>
    <!-- Point 2 -->
    <circle cx="16" cy="66" r="16" fill="#1a56db" opacity="0.3"/>
    <text x="16" y="71" font-family="Arial" font-size="14" fill="#60a5fa" text-anchor="middle">✓</text>
    <text x="44" y="71" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">Calcul personnalisé par ville</text>
    <!-- Point 3 -->
    <circle cx="16" cy="116" r="16" fill="#1a56db" opacity="0.3"/>
    <text x="16" y="121" font-family="Arial" font-size="14" fill="#60a5fa" text-anchor="middle">✓</text>
    <text x="44" y="121" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">25+ simulateurs immobiliers</text>
  </g>
  <!-- Right side: stats panel -->
  <rect x="750" y="290" width="370" height="200" rx="16" fill="#1a56db" opacity="0.15"/>
  <rect x="750" y="290" width="370" height="200" rx="16" fill="none" stroke="#1a56db" stroke-width="1" opacity="0.4"/>
  <text x="935" y="335" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#93c5fd" text-anchor="middle">Taux moyen 2026</text>
  <text x="935" y="375" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#ffffff" text-anchor="middle">3,7 %</text>
  <text x="935" y="405" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">sur 20 ans</text>
  <rect x="770" y="425" width="330" height="1" fill="#1a56db" opacity="0.3"/>
  <text x="935" y="460" font-family="Inter, Arial, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">Gratuit · Sans inscription</text>
  <!-- Domain -->
  <text x="80" y="590" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#60a5fa">louer-acheter.fr</text>
  <text x="1120" y="590" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569" text-anchor="end">2026</text>
</svg>
